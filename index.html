<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>/etc/tools</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <a href="#" class="logo">/etc/tools<span class="cursor"></span></a>

        <div class="header-right">
            <button class="tool-trigger" id="tool-trigger">
                <span id="tool-trigger-text"><span class="scope">...</span></span>
                <kbd>ctrl+k</kbd>
            </button>

            <button class="theme-switch" id="theme-switch">[dark]</button>
        </div>
    </header>

    <div class="palette-overlay" id="palette">
        <div class="palette">
            <input type="text" class="palette-input" id="palette-input" placeholder="search tools...">
            <div class="palette-list" id="palette-list"></div>
        </div>
    </div>

    <main id="tool-container"></main>

    <footer>
        <a href="https://github.com/isaidsari/etc-tools" target="_blank">src</a>
    </footer>

    <div class="toast" id="toast"></div>

    <script src="js/core.js"></script>

    <script src="js/tools/mongo-bindata.js"></script>
    <script src="js/tools/mongo-objectid.js"></script>
    <script src="js/tools/time-epoch.js"></script>
    <script src="js/tools/data-struct.js"></script>
    <script src="js/tools/data-crc.js"></script>
    <script src="js/tools/stream-port.js"></script>

</body>

</html>
