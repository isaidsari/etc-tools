<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.12; }
    }
    .cursor { animation: blink 1.1s steps(2, end) infinite; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #f3f3f3; }
      .fg { fill: #5b6970; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0c0c0d; }
      .fg { fill: #a4afb8; }
    }
  </style>
  <rect class="bg" width="32" height="32" rx="4"/>
  <rect class="cursor fg" x="10" y="18" width="12" height="3" rx="1"/>
</svg>
